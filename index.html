<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Souza Farma v109 - Personalizada</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #e30613; --secondary: #fff200; --dorflex-blue: #2d1a70; }
        body { font-family: 'Arial Black', sans-serif; background: #cbd5e1; padding: 20px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 12px; max-width: 1100px; margin: 0 auto 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #cbd5e1; }
        .tab-btn { padding: 12px 20px; border: none; background: #e2e8f0; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: 900; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .field { display: flex; flex-direction: column; position: relative; }
        label { font-size: 10px; font-weight: bold; color: #444; margin-bottom: 4px; }
        input, select { padding: 10px; border: 2px solid #ccc; border-radius: 6px; font-weight: bold; }
        
        #suggestions, #suggestionsLP, #suggestionsPHOTO { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; z-index: 2000; max-height: 200px; overflow-y: auto; display: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .suggestion-item { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee; }

        .btn-group { grid-column: span 2; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .btn-add { background: #16a34a; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 900; flex: 2; font-size: 16px; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 900; flex: 1; }
        .btn-clear { background: #64748b; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 900; flex: 1; }

        #printArea { display: block; width: 100%; max-width: 21cm; margin: 0 auto; background: white; text-align: left; }
        .tag { background: white; border: 2px solid #000; position: relative; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; text-align: center; page-break-inside: avoid; }
        .gondola-container { display: flex; flex-wrap: wrap; gap: 0; justify-content: flex-start; padding: 1cm; box-sizing: border-box; }

        /* --- PADRÃO GERAL --- */
        .farmacia-header { font-weight: 900; color: #000; text-transform: uppercase; display: flex; justify-content: center; align-items: center; }
        .promo-banner { background: var(--primary); color: var(--secondary); font-weight: 900; border-bottom: 1px solid #000; text-transform: uppercase; }
        .tag-title { font-weight: 900; line-height: 1.1; text-transform: uppercase; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 2px 4px; flex-grow: 1; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0 8px; background: white; }
        .old-price-label { color: #000; font-weight: bold; text-decoration: line-through; }
        .perc-badge-outer { background: #000; color: #fff; border-radius: 4px; font-weight: 900; }
        .price-box { background: var(--secondary); border-top: 1px solid #000; border-bottom: 1px solid #000; display: flex; justify-content: center; align-items: center; }
        .main-price { color: var(--primary); font-weight: 900; display: flex; align-items: flex-start; line-height: 0.85; }
        .label-por { font-weight: 900; color: #000; }
        .footer-barcode { background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* --- AJUSTES ESPECÍFICOS POR TAMANHO --- */

        /* 6x3 (IGUAL À FOTO) */
        .size-6x3 { width: 6cm !important; height: 3cm !important; border: 0.5px solid #000; }
        .size-6x3 .farmacia-header { font-size: 8px; padding: 2px; order: 1; }
        .size-6x3 .promo-banner { font-size: 11px; padding: 3px; order: 2; }
        .size-6x3 .tag-title { font-size: 9.5px; height: 22px; order: 3; }
        .size-6x3 .info-row { order: 4; min-height: 18px; }
        .size-6x3 .old-price-label { font-size: 9px; }
        .size-6x3 .perc-badge-outer { font-size: 11px; padding: 2px 5px; }
        .size-6x3 .price-box { order: 5; padding: 2px; }
        .size-6x3 .main-price { font-size: 26px; }
        .size-6x3 .label-por { font-size: 10px; margin-right: 2px; }
        .size-6x3 .footer-barcode { order: 6; height: 15px; }

        /* CARTAZ A4 */
        .size-A4P { width: 21cm; height: 29.7cm; padding: 1cm; margin: 0 auto 10px !important; border: 3px solid #000; }
        .size-A4P .farmacia-header { font-size: 30px; padding: 15px; }
        .size-A4P .promo-banner { font-size: 80px; padding: 25px; border-bottom: 5px solid #000; }
        .size-A4P .tag-title { font-size: 70px; padding: 20px; }
        .size-A4P .old-price-label { font-size: 45px; }
        .size-A4P .perc-badge-outer { font-size: 55px; padding: 15px 30px; }
        .size-A4P .label-por { font-size: 50px; margin-right: 15px; }
        .size-A4P .main-price { font-size: 280px; }
        .size-A4P .price-box { padding: 30px; border-width: 5px; }
        .size-A4P .footer-barcode { height: 180px; }

        /* CARTAZ A5 */
        .size-A5 { width: 14.8cm; height: 21cm; padding: 0.6cm; margin: 0 auto 10px !important; border: 2px solid #000; }
        .size-A5 .farmacia-header { font-size: 22px; padding: 10px; }
        .size-A5 .promo-banner { font-size: 55px; padding: 15px; border-bottom: 4px solid #000; }
        .size-A5 .tag-title { font-size: 45px; }
        .size-A5 .old-price-label { font-size: 30px; }
        .size-A5 .perc-badge-outer { font-size: 40px; padding: 10px 20px; }
        .size-A5 .label-por { font-size: 35px; }
        .size-A5 .main-price { font-size: 180px; }
        .size-A5 .price-box { padding: 20px; }
        .size-A5 .footer-barcode { height: 140px; }

        /* CARTAZ 17x9 */
        .size-17x8 { width: 17cm !important; height: 9cm !important; border: 2px solid #000; margin-bottom: 5px !important; }
        .size-17x8 .farmacia-header { font-size: 18px; padding: 5px; }
        .size-17x8 .promo-banner { font-size: 35px; padding: 8px; }
        .size-17x8 .tag-title { font-size: 38px; }
        .size-17x8 .main-price { font-size: 90px; }
        .size-17x8 .label-por { font-size: 25px; }
        .size-17x8 .old-price-label { font-size: 22px; }

        /* ETIQUETA 6x4 e 8x6 */
        .size-6x4 { width: 6cm !important; height: 4cm !important; border: 0.5px solid #000; }
        .size-6x4 .promo-banner { font-size: 14px; } .size-6x4 .tag-title { font-size: 12px; }
        .size-8x6 { width: 8cm !important; height: 6cm !important; border: 1px solid #000; }
        .size-8x6 .promo-banner { font-size: 20px; } .size-8x6 .tag-title { font-size: 18px; }

        /* OUTROS ESTILOS MANTIDOS */
        .size-6x105 { width: 6cm !important; height: 10.5cm !important; border: 1px solid #000; margin: 5px 0; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .photo-blank-space { height: 3cm; border-bottom: 1px dashed #ccc; }
        .photo-content { flex: 1; padding: 8px; display: flex; flex-direction: column; text-align: left; }
        .photo-prod-name { font-size: 13px; font-weight: 900; text-transform: uppercase; }
        .photo-yellow-box { background: var(--secondary); margin-top: auto; padding: 10px; border-top: 2px solid #000; text-align: center; margin-left: -8px; margin-right: -8px; }
        .photo-final-price { font-size: 48px; font-weight: 900; }

        @media print { .no-print, .delete-btn { display: none !important; } body { background: white; padding: 0; } @page { margin: 0; size: auto; } }
    </style>
</head>
<body>
    <div class="no-print" id="statusPainel" style="background:#f1f5f9; padding:10px; margin:10px auto; max-width:1100px; border-radius:8px; border:1px solid #cbd5e1; font-size:12px; font-weight:bold; display: flex; justify-content: space-between;">
        <span id="txtPlanilha">📊 PLANILHA: Verificando...</span>
        <span id="txtUpdate">📅 ÚLTIMA ATUALIZAÇÃO: --/--/--</span>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBfxAE5NnNQ2JKn8iX8-s8lz7M_CVQG6DI", authDomain: "etiqueta-70cbf.firebaseapp.com", databaseURL: "https://etiqueta-70cbf-default-rtdb.firebaseio.com/", projectId: "etiqueta-70cbf", storageBucket: "etiqueta-70cbf.firebasestorage.app", messagingSenderId: "899263207040", appId: "1:899263207040:web:7103a5f0fb49ca15f1b865" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <div class="no-print" style="text-align:center; padding: 15px;">
        <b style="color:var(--primary); font-size: 18px;">SOUZA FARMA - FARMÁCIA DO TRABALHADOR</b>
    </div>

    <div class="no-print">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'etiquetas')">ETIQUETAS PADRÃO</button>
            <button class="tab-btn" onclick="openTab(event, 'promocoes')">PROMOÇÕES (LEVE/PAGUE)</button>
            <button class="tab-btn" onclick="openTab(event, 'abaFoto')">ETIQUETA 6x10,5 (FOTO)</button>
        </div>

        <div id="etiquetas" class="tab-content active">
            <div class="grid-form">
                <div class="field" style="grid-column: span 2;"><label>PRODUTO</label><input type="text" id="searchField" class="nav" placeholder="Digite ou bipe..." autocomplete="off"><div id="suggestions"></div></div>
                <div class="field"><label>PREÇO DE</label><input type="text" id="pOld" class="nav" placeholder="0,00"></div>
                <div class="field"><label>PREÇO POR</label><input type="text" id="pNew" class="nav" placeholder="0,00"></div>
                <div class="field"><label>TAMANHO</label><select id="pSize" class="nav"><option value="size-6x3">6x3 (Padrão Foto)</option><option value="size-6x4">6x4</option><option value="size-8x6">8x6</option><option value="size-17x8">Cartaz 17x9cm</option><option value="size-A5">Cartaz A5</option><option value="size-A4P">Cartaz A4</option></select></div>
                <div class="field"><label>CAMPANHA</label><select id="pPromo" class="nav"><option value="OFERTA">OFERTA</option><option value="MEGA OFERTA">MEGA OFERTA</option><option value="IMBATÍVEL">IMBATÍVEL</option><option value="">Sem Frase</option></select></div>
                <div class="field"><label>QTD</label><input type="number" id="pQty" class="nav" value="1"></div>
                <div class="btn-group">
                    <button class="btn-add" id="btnAddTag" onclick="addTag()">ADICIONAR</button>
                    <button class="btn-print" onclick="window.print()">IMPRIMIR</button>
                    <button class="btn-clear" onclick="clearAll()">LIMPAR</button>
                </div>
            </div>
            <div id="histDisplay" style="margin-top:10px;"></div>
        </div>

        <div id="promocoes" class="tab-content">
            <div class="grid-form">
                <div class="field" style="grid-column: span 2;"><label>PRODUTO</label><input type="text" id="lpProd" class="navLP" autocomplete="off"><div id="suggestionsLP"></div></div>
                <div class="field"><label>LEVE</label><input type="number" id="lpLeve" class="navLP" value="3" oninput="calcLP()"></div>
                <div class="field"><label>PAGUE</label><input type="number" id="lpPague" class="navLP" value="2" oninput="calcLP()"></div>
                <div class="field"><label>VALOR UN.</label><input type="text" id="lpUnit" class="navLP" oninput="calcLP()"></div>
                <div class="field"><label>FINAL SAI POR</label><input type="text" id="lpFinal" readonly></div>
                <div class="btn-group"><button class="btn-add" id="btnAddLP" onclick="addLPTag()">GERAR CARTAZ</button></div>
            </div>
        </div>

        <div id="abaFoto" class="tab-content">
            <div class="grid-form">
                <div class="field" style="grid-column: span 2;"><label>PRODUTO</label><input type="text" id="photoProd" class="navPhoto" autocomplete="off"><div id="suggestionsPHOTO"></div></div>
                <div class="field"><label>CADA SAI POR</label><input type="text" id="photoFinal" class="navPhoto"></div>
                <div class="btn-group"><button class="btn-add" onclick="addPhotoTag()">ADICIONAR FOTO</button></div>
            </div>
        </div>
    </div>

    <div id="printArea">
        <div id="gondolaArea" class="gondola-container"></div>
        <div id="posterArea"></div>
    </div>

    <script>
        let db = []; let selectedItem = null; let historyData = [];
        database.ref('produtos').on('value', (s) => { 
            db = s.val() ? Object.values(s.val()) : []; 
            document.getElementById('txtPlanilha').innerText = `📊 PLANILHA: ${db.length > 0 ? '✅ CONECTADA' : '⚠️ VAZIA'}`;
        });

        // NAVEGAÇÃO ENTER
        function setupEnterNavigation() {
            ['nav', 'navLP', 'navPhoto'].forEach(groupClass => {
                const fields = document.querySelectorAll('.' + groupClass);
                fields.forEach((f, i) => {
                    f.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            if (i < fields.length - 1) fields[i + 1].focus();
                            else {
                                if(groupClass === 'nav') addTag();
                                if(groupClass === 'navLP') addLPTag();
                                if(groupClass === 'navPhoto') addPhotoTag();
                            }
                        }
                    });
                });
            });
        }
        setTimeout(setupEnterNavigation, 1000);

        function setupBipe(inputId, focusId, suggestionId, type) {
            const input = document.getElementById(inputId);
            input.addEventListener('input', (e) => {
                const val = e.target.value.toUpperCase().trim();
                if(!val) return;
                const exact = db.find(i => String(Object.values(i)[0]) == val || String(Object.values(i)[1]) == val);
                if(exact) {
                    selectItem(Object.values(exact)[0], Object.values(exact)[2], inputId, focusId, suggestionId, type);
                } else if(val.length >= 2) {
                    const matches = db.filter(i => String(Object.values(i)[2]).toUpperCase().includes(val));
                    document.getElementById(suggestionId).innerHTML = matches.slice(0,10).map(m => `<div class="suggestion-item" onclick="selectItem('${Object.values(m)[0]}', '${Object.values(m)[2]}', '${inputId}', '${focusId}', '${suggestionId}', '${type}')">${Object.values(m)[2]}</div>`).join('');
                    document.getElementById(suggestionId).style.display = 'block';
                }
            });
        }
        setupBipe('searchField', 'pOld', 'suggestions', 'std');
        setupBipe('lpProd', 'lpLeve', 'suggestionsLP', 'lp');
        setupBipe('photoProd', 'photoFinal', 'suggestionsPHOTO', 'photo');

        function selectItem(code, name, inputId, focusId, suggestionId, type) {
            if(type === 'std') selectedItem = {code, name};
            document.getElementById(inputId).value = name;
            document.getElementById(suggestionId).style.display = 'none';
            setTimeout(() => document.getElementById(focusId).focus(), 100);
        }

        function addTag(reuseItem = null) {
            const name = reuseItem ? reuseItem.name : document.getElementById('searchField').value;
            const oldP = reuseItem ? reuseItem.old : document.getElementById('pOld').value;
            const newP = reuseItem ? reuseItem.new : document.getElementById('pNew').value;
            const size = document.getElementById('pSize').value;
            const promo = document.getElementById('pPromo').value;
            const qty = reuseItem ? 1 : parseInt(document.getElementById('pQty').value);
            if (!name || !newP) return;

            const [reais, cents] = newP.split(',');
            const barcode = reuseItem ? reuseItem.code : (selectedItem ? selectedItem.code : "0000000000000");
            const vOld = parseFloat(oldP.replace(',', '.')), vNew = parseFloat(newP.replace(',', '.'));
            const perc = (vOld > vNew) ? Math.round(((vOld - vNew) / vOld) * 100) : 0;
            
            let area = (size.includes('size-6') || size.includes('size-8') ? 'gondolaArea' : 'posterArea');

            for (let i = 0; i < qty; i++) {
                const tagId = "bc-" + Date.now() + i;
                const div = document.createElement('div');
                div.className = `tag ${size}`;
                div.innerHTML = `
                    <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                    <div class="farmacia-header">SOUZA FARMA</div>
                    <div class="promo-banner">${promo}</div>
                    <div class="tag-title">${name.toUpperCase()}</div>
                    <div class="info-row">
                        <div class="old-price-label">${(oldP && oldP !== '0,00') ? 'DE R$ '+oldP : ''}</div>
                        ${perc > 0 ? `<div class="perc-badge-outer">-${perc}%</div>` : ''}
                    </div>
                    <div class="price-box">
                        <span class="label-por">POR</span>
                        <div class="main-price">
                            <small style="font-size:0.35em;">R$</small>${reais}<small style="font-size:0.4em; text-decoration:underline;">,${cents||'00'}</small>
                        </div>
                    </div>
                    <div class="footer-barcode"><svg id="${tagId}"></svg></div>
                `;
                document.getElementById(area).appendChild(div);
                JsBarcode(`#${tagId}`, barcode, { format: "CODE128", width: size.includes('A')?3:1, height: size.includes('A')?80:size.includes('6x3')?15:25, displayValue: true, fontSize: size.includes('A')?25:10 });
            }
            if(!reuseItem) { historyData.unshift({name, old: oldP, new: newP, code: barcode}); updateHistory(); document.getElementById('searchField').value = ""; document.getElementById('pOld').value = ""; document.getElementById('pNew').value = ""; document.getElementById('searchField').focus(); }
        }

        function addLPTag() {
            const div = document.createElement('div'); div.className = 'promo-tag-lp';
            div.innerHTML = `<button class="delete-btn" onclick="this.parentElement.remove()">X</button><div class="lp-header-box"><h1>OFERTA</h1></div><div class="lp-prod-name">${document.getElementById('lpProd').value.toUpperCase()}</div><div class="lp-yellow-box">LEVE ${document.getElementById('lpLeve').value} SAI POR: R$ <b>${document.getElementById('lpFinal').value}</b></div>`;
            document.getElementById('posterArea').appendChild(div);
        }

        function addPhotoTag() {
            const div = document.createElement('div'); div.className = 'size-6x105';
            div.innerHTML = `<button class="delete-btn" onclick="this.parentElement.remove()">X</button><div class="photo-blank-space"></div><div class="photo-content"><div class="photo-prod-name">${document.getElementById('photoProd').value}</div><div class="photo-yellow-box"><div class="photo-final-price">R$ ${document.getElementById('photoFinal').value}</div></div></div>`;
            document.getElementById('gondolaArea').appendChild(div);
        }

        function calcLP() { 
            const l = parseInt(document.getElementById('lpLeve').value) || 0, p = parseInt(document.getElementById('lpPague').value) || 0, u = parseFloat(document.getElementById('lpUnit').value.replace(',', '.')) || 0;
            if(l > 0 && u > 0) document.getElementById('lpFinal').value = ((p * u) / l).toLocaleString('pt-br', {minimumFractionDigits:2});
        }
        function updateHistory() { document.getElementById('histDisplay').innerHTML = historyData.slice(0, 6).map((h, i) => `<span class="hist-chip" onclick='addTag(historyData[${i}])'>${h.name}</span>`).join(''); }
        function openTab(evt, tabName) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tabName).classList.add('active'); evt.currentTarget.classList.add('active'); }
        function handleExcel(e) { const reader = new FileReader(); reader.onload = (evt) => { const workbook = XLSX.read(evt.target.result, { type: 'binary' }); const products = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]); database.ref('produtos').set(products).then(() => alert("Sincronizado!")); }; reader.readAsBinaryString(e.target.files[0]); }
        function clearAll() { if(confirm("Limpar?")) document.querySelectorAll('#gondolaArea, #posterArea').forEach(a => a.innerHTML=""); }
    </script>
</body>
</html>
