<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Souza Farma v109 - Divisão de Abas</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #e30613; --secondary: #fff200; }
        body { font-family: 'Arial Black', sans-serif; background: #cbd5e1; padding: 20px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 12px; max-width: 1100px; margin: 0 auto 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #cbd5e1; }
        .tab-btn { padding: 12px 20px; border: none; background: #e2e8f0; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: 900; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .field { display: flex; flex-direction: column; position: relative; }
        label { font-size: 10px; font-weight: bold; color: #444; margin-bottom: 4px; }
        input, select { padding: 10px; border: 2px solid #ccc; border-radius: 6px; font-weight: bold; }
        
        #suggestions, #suggestionsLP, #suggestionsFoto { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; z-index: 2000; max-height: 200px; overflow-y: auto; display: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .suggestion-item { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee; }

        .btn-group { grid-column: span 2; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .btn-add { background: #16a34a; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 900; flex: 2; font-size: 16px; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 900; flex: 1; }
        .btn-clear { background: #64748b; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 900; flex: 1; }

        #printArea { display: block; width: 100%; max-width: 21cm; margin: 0 auto; background: white; }
        .tag { background: white; border: 2px solid #000; position: relative; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; text-align: center; page-break-inside: avoid; }
        
        /* TAMANHOS */
        .size-70mm { width: 70mm; padding: 0.3cm; border: 1px dashed #999; margin-bottom: 5px; }
        .size-6x3 { width: 6cm !important; height: 3cm !important; border: 0.5px solid #000; }
        .size-6x4 { width: 6cm !important; height: 4cm !important; border: 0.5px solid #000; }
        .size-8x6 { width: 8cm !important; height: 6cm !important; border: 1px solid #000; }
        .size-17x8 { width: 17cm !important; height: 9cm !important; border: 2px solid #000; margin: 0 auto 5px; }
        .size-A5 { width: 14.8cm; height: 21cm; padding: 0.6cm; margin: 0 auto 10px; }
        .size-A4P { width: 21cm; height: 29.7cm; padding: 1cm; margin: 0 auto 10px; }
        
        /* LAYOUT FOTO 6x10,5 */
        .size-6x105 { width: 6cm !important; height: 10.5cm !important; border: 1px solid #000; padding: 0 !important; }
        .header-white-6x105 { height: 3cm; width: 100%; background: white; }
        .body-6x105 { flex: 1; display: flex; flex-direction: column; padding: 5px; text-align: left; }
        .yellow-footer-6x105 { background: var(--secondary); padding: 10px 5px; border-top: 1px solid #000; text-align: center; }

        .tag-title { font-weight: 900; padding: 2px 4px; text-transform: uppercase; font-size: 11px; overflow: hidden; line-height: 1.1; display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        .promo-banner { background: var(--primary); color: var(--secondary); font-size: 12px; font-weight: 900; padding: 3px; border-bottom: 1px solid #000; }
        .price-box { background: var(--secondary); padding: 4px; border-top: 1px solid #000; border-bottom: 1px solid #000; display: flex; justify-content: center; align-items: center; }
        .main-price { color: var(--primary); font-weight: 900; display: flex; align-items: flex-start; line-height: 0.85; font-size: 40px; }
        .footer-barcode { background: white; display: flex; justify-content: center; padding: 2px 0; }
        .delete-btn { position: absolute; top: 1px; left: 1px; background: #000; color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; z-index: 1000; cursor: pointer; }

        @media print { .no-print, .delete-btn { display: none !important; } body { background: white; } #printArea { width: 100%; } }
    </style>
</head>
<body>
    <div class="no-print" id="statusPainel" style="background:#f1f5f9; padding:10px; margin:10px auto; max-width:1100px; border-radius:8px; border:1px solid #cbd5e1; font-size:12px; font-weight:bold; display: flex; justify-content: space-between;">
        <span id="txtPlanilha">📊 PLANILHA: Verificando...</span>
        <span id="txtUpdate">📅 ÚLTIMA ATUALIZAÇÃO: --/--/--</span>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBfxAE5NnNQ2JKn8iX8-s8lz7M_CVQG6DI", authDomain: "etiqueta-70cbf.firebaseapp.com", databaseURL: "https://etiqueta-70cbf-default-rtdb.firebaseio.com/", projectId: "etiqueta-70cbf", storageBucket: "etiqueta-70cbf.firebasestorage.app", messagingSenderId: "899263207040", appId: "1:899263207040:web:7103a5f0fb49ca15f1b865" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <div class="no-print">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'etiquetas')">PADRÃO (OFERTA/HOJE)</button>
            <button class="tab-btn" onclick="openTab(event, 'abaFoto')">ETIQUETA FOTO (6x10,5)</button>
            <button class="tab-btn" onclick="openTab(event, 'promocoes')">LEVE/PAGUE (A4)</button>
        </div>

        <div id="etiquetas" class="tab-content active">
            <div class="grid-form">
                <div class="field" style="grid-column: span 2;"><label>PRODUTO</label><input type="text" id="searchField" class="nav" placeholder="Busque..."><div id="suggestions"></div></div>
                <div class="field"><label>PREÇO DE</label><input type="text" id="pOld" class="nav" placeholder="0,00"></div>
                <div class="field"><label>PREÇO POR</label><input type="text" id="pNew" class="nav" placeholder="0,00"></div>
                <div class="field"><label>TAMANHO</label><select id="pSize" class="nav">
                    <option value="size-70mm">Térmica 70mm</option>
                    <option value="size-6x3">6x3</option>
                    <option value="size-6x4">6x4</option>
                    <option value="size-8x6">8x6</option>
                    <option value="size-17x8">Cartaz 17x9cm</option>
                </select></div>
                <div class="field"><label>CAMPANHA</label><select id="pPromo" class="nav">
                    <option value="OFERTA">OFERTA</option>
                    <option value="MEGA OFERTA">MEGA OFERTA</option>
                    <option value="IMBATÍVEL">IMBATÍVEL</option>
                    <option value="SÓ HOJE">SÓ HOJE</option>
                    <option value="">Sem Frase</option>
                </select></div>
                <div class="field"><label>QTD</label><input type="number" id="pQty" class="nav" value="1"></div>
                <div class="btn-group">
                    <button class="btn-add" onclick="addTag()">ADICIONAR</button>
                    <button class="btn-print" onclick="window.print()">IMPRIMIR</button>
                    <button class="btn-clear" onclick="clearAll()">LIMPAR</button>
                </div>
            </div>
        </div>

        <div id="abaFoto" class="tab-content">
            <div class="grid-form">
                <div class="field" style="grid-column: span 2;"><label>PRODUTO (BIPE OU BUSQUE)</label><input type="text" id="fProd" class="navF" placeholder="Digite..."><div id="suggestionsFoto"></div></div>
                <div class="field"><label>PREÇO UNITÁRIO (R$)</label><input type="text" id="fUnit" class="navF" placeholder="19,99"></div>
                <div class="field"><label>PREÇO NO KIT (R$)</label><input type="text" id="fKitPrice" class="navF" placeholder="16,99"></div>
                <div class="field"><label>TEXTO KIT</label><input type="text" id="fTexto" class="navF" value="LEVE 2 POR"></div>
                <div class="field"><label>VALIDADE</label><input type="text" id="fData" class="navF" value="25/01/2026"></div>
                <div class="btn-group">
                    <button class="btn-add" onclick="addFotoTag()">GERAR ETIQUETA FOTO</button>
                </div>
            </div>
        </div>

        <div id="promocoes" class="tab-content">
             <div class="grid-form">
                <div class="field" style="grid-column: span 2;"><label>PRODUTO</label><input type="text" id="lpProd" class="navLP"><div id="suggestionsLP"></div></div>
                <div class="field"><label>LEVE</label><input type="number" id="lpLeve" value="3" oninput="calcLP()"></div>
                <div class="field"><label>PAGUE</label><input type="number" id="lpPague" value="2" oninput="calcLP()"></div>
                <div class="field"><label>UNITÁRIO</label><input type="text" id="lpUnit" oninput="calcLP()"></div>
                <div class="btn-group"><button class="btn-add" onclick="addLPTag()">GERAR CARTAZ A4</button></div>
            </div>
        </div>
    </div>

    <div id="printArea">
        <div id="thermalArea"></div>
        <div id="gondolaArea" style="display: flex; flex-wrap: wrap; gap: 2px;"></div>
        <div id="posterArea"></div>
    </div>

    <script>
        let db = []; let selectedItem = null; let selectedItemF = null;
        database.ref('produtos').on('value', (s) => { 
            db = s.val() ? Object.values(s.val()) : [];
            document.getElementById('txtPlanilha').innerText = `📊 PLANILHA: ${db.length > 0 ? 'CONECTADA' : 'VAZIA'}`;
            document.getElementById('txtUpdate').innerText = `📅 ATUALIZADO: ${new Date().toLocaleDateString()}`;
        });

        function setupBipe(inputId, suggestionId, callback) {
            document.getElementById(inputId).addEventListener('input', (e) => {
                const val = e.target.value.toUpperCase();
                if(val.length < 2) return;
                const matches = db.filter(i => String(Object.values(i)[2]).toUpperCase().includes(val) || String(Object.values(i)[0]).includes(val));
                document.getElementById(suggestionId).innerHTML = matches.slice(0,8).map(m => `<div class="suggestion-item" onclick="selectItem('${Object.values(m)[0]}','${Object.values(m)[2]}','${inputId}','${suggestionId}')">${Object.values(m)[2]}</div>`).join('');
                document.getElementById(suggestionId).style.display = 'block';
            });
        }
        function selectItem(code, name, inputId, suggId) { 
            document.getElementById(inputId).value = name; 
            document.getElementById(suggId).style.display = 'none';
            if(inputId === 'searchField') selectedItem = {code, name};
            if(inputId === 'fProd') selectedItemF = {code, name};
        }
        setupBipe('searchField', 'suggestions');
        setupBipe('fProd', 'suggestionsFoto');

        function addTag() {
            const name = document.getElementById('searchField').value, oldP = document.getElementById('pOld').value, newP = document.getElementById('pNew').value;
            const size = document.getElementById('pSize').value, promo = document.getElementById('pPromo').value, qty = document.getElementById('pQty').value;
            const barcode = selectedItem ? selectedItem.code : "0000000000000";
            const [reais, cents] = newP.split(',');
            for(let i=0; i<qty; i++){
                const tagId = "bc-"+Date.now()+i, div = document.createElement('div'); div.className = `tag ${size}`;
                div.innerHTML = `<button class="delete-btn" onclick="this.parentElement.remove()">X</button><div class="farmacia-header">SOUZA FARMA</div>${promo?`<div class="promo-banner">${promo}</div>`:''}<div class="tag-title">${name.toUpperCase()}</div><div class="price-box"><span class="label-por">POR</span><div class="main-price"><small>R$</small>${reais}<small>,${cents||'00'}</small></div></div><div class="footer-barcode"><svg id="${tagId}"></svg></div>`;
                document.getElementById(size==='size-70mm'?'thermalArea':'gondolaArea').appendChild(div);
                JsBarcode(`#${tagId}`, barcode, {width: 1, height: 25, fontSize: 10});
            }
        }

        function addFotoTag() {
            const name = document.getElementById('fProd').value, unit = document.getElementById('fUnit').value, kit = document.getElementById('fKitPrice').value;
            const texto = document.getElementById('fTexto').value, dataVal = document.getElementById('fData').value;
            const barcode = selectedItemF ? selectedItemF.code : "0000000000000";
            const [kReais, kCents] = kit.split(',');
            const kitTotal = (parseFloat(kit.replace(',','.')) * 2).toFixed(2).replace('.',',');

            const div = document.createElement('div'); div.className = 'tag size-6x105';
            div.innerHTML = `<button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                <div class="header-white-6x105"></div>
                <div class="body-6x105">
                    <div style="font-size:12px; font-weight:900; line-height:1.2; height:40px; overflow:hidden;">${name.toUpperCase()}</div>
                    <div style="margin-top:5px; font-size:16px;">R$ <b style="font-size:22px;">${unit}</b> <small>CADA</small></div>
                    <div class="footer-barcode" style="margin-top:auto;"><svg id="fbc-${Date.now()}"></svg></div>
                </div>
                <div class="yellow-footer-6x105">
                    <div style="font-size:22px; font-weight:900;">${texto}</div>
                    <div style="display:flex; justify-content:center; align-items:flex-start; color:#e30613; margin:2px 0;">
                        <span style="font-size:16px; margin-top:10px; font-weight:900; color:#000;">R$</span>
                        <b style="font-size:55px; line-height:0.8; color:#000;">${kReais}</b>
                        <div style="display:flex; flex-direction:column; align-items:flex-start;">
                            <b style="font-size:22px; line-height:1; color:#000; text-decoration:underline;">,${kCents||'00'}</b>
                            <span style="font-size:12px; color:#000; font-weight:900;">CADA</span>
                        </div>
                    </div>
                    <div style="font-weight:900; font-size:14px; border-top:1px solid #000; padding-top:2px;">Valor do Kit: R$ ${kitTotal}</div>
                    <div style="font-size:10px; margin-top:5px;">Ofertas até ${dataVal}</div>
                </div>`;
            document.getElementById('gondolaArea').appendChild(div);
            JsBarcode(`#fbc-${Date.now()}`, barcode, {width: 1, height: 25, fontSize: 10});
        }

        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
        function clearAll() { document.getElementById('thermalArea').innerHTML = ""; document.getElementById('gondolaArea').innerHTML = ""; document.getElementById('posterArea').innerHTML = ""; }
    </script>
</body>
</html>
